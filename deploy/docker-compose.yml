services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: suitdb
      POSTGRES_USER: suit
      POSTGRES_PASSWORD: suit123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suit -d suitdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ../backend:/app
    restart: unless-stopped
    command: ["sh", "-c", "set -e && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  scheduler:
    build:
      context: ../scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  celery-worker:
    build:
      context: ../backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ../backend:/app
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "worker", "--loglevel=INFO"]
    restart: unless-stopped

  celery-beat:
    build:
      context: ../backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ../backend:/app
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "beat", "--loglevel=INFO"]
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_PORT:-18080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
